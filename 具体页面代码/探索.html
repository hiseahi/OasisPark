<script>
// ==================== Supabase 配置 ====================
const SUPABASE_URL = 'https://gjgacyoqpztsozoljsrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LcsFsepI69M19xAvYzMpcA_YCAmjvBl';

let currentParks = [];
let allParksCache = [];
let currentPosts = [];

// ==================== 工具函数 ====================
function getTimeAgo(dateStr) {
    if (!dateStr) return '刚刚';
    const date = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
    return date.toLocaleDateString('zh-CN');
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// 获取 session
function getSession() {
    try {
        const sessionStr = localStorage.getItem('oasis_session');
        if (sessionStr) {
            const session = JSON.parse(sessionStr);
            const expiresAt = new Date(session.expires_at);
            if (expiresAt > new Date()) {
                return session;
            } else {
                localStorage.removeItem('oasis_session');
            }
        }
    } catch(e) {}
    return null;
}

// ==================== 获取图片质量评分 ====================
function getImageQualityScore(imageUrl) {
    if (!imageUrl || typeof imageUrl !== 'string' || !imageUrl.startsWith('http')) return 0;
    let score = 0;
    const resolutionMatch = imageUrl.match(/_(\d{3,4})_(\d{3,4})_/);
    if (resolutionMatch) {
        const width = parseInt(resolutionMatch[1]);
        if (width >= 2000) score = 100;
        else if (width >= 1024) score = 90;
        else if (width >= 640) score = 70;
        else score = 40;
    }
    if (score === 0) {
        if (imageUrl.includes('store.is.autonavi.com')) score = 55;
        else if (imageUrl.includes('aos-comment.amap.com')) score = 45;
        else score = 30;
    }
    if (imageUrl.includes('_320_320_') || imageUrl.includes('_480_480_') || 
        imageUrl.includes('thumb') || imageUrl.includes('small') || imageUrl.includes('160x160')) {
        score = Math.min(score, 40);
    }
    return score;
}

// ==================== 获取公园数据（使用RPC + 优先推荐逻辑） ====================
async function loadRandomParks(count = 8) {
    try {
        const highQualityParks = [
            '深圳湾公园观桥公园', '翠湖文体公园', '深圳湾公园日出剧场', '风举公园',
            '凤凰公园', '深圳湾公园海韵园', '海山公园', '西丽生态公园',
            '塘朗山公园-无暑平台', '明湖城市公园二期', '奥园·翡翠东湾社区公园', '广东梧桐山国家森林公园',
            '深圳湾草地公园', '云海公园', '塘朗山公园-极目阁', '深圳人才公园人才星光大道',
            '粤海体育休闲公园', '海景公园', '深圳中心公园-大草坪', '阳台山森林公园-羊臺山',
            '四季公园', '明湖公园', '洪田火山公园', '深圳民治体育公园',
            '阳台山森林公园登山广场', '沙湾关口公园', '文心公园', '北站中心公园樱花园',
            '石岩环湖碧道石头山公园', '大岭鼓公园', '欢乐港湾-滨海文化公园', '深圳中心公园D2区',
            '观桥公园-观景平台'
        ];
        
        let parks = [];
        let firstPark = null;
        let attempts = 0;
        const maxAttempts = 3;
        
        while (attempts < maxAttempts && !firstPark) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_random_parks`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ limit_count: count * 3 })
            });
            parks = await response.json();
            
            const blacklist = ['消防', '防火', '禁毒', '法治', '法制', '主题公园', '雕塑', '纪念碑', '管理处','管理服务中心','阳台山森林公园','龙胜公园'];
            parks = parks.filter(park => {
                const name = park.name || '';
                if (!name.includes('公园')) return false;
                for (let word of blacklist) {
                    if (name.includes(word)) return false;
                }
                return true;
            });
            
            for (let hqName of highQualityParks) {
                const matched = parks.find(park => park.name === hqName);
                if (matched) {
                    firstPark = matched;
                    parks = parks.filter(park => park.id !== matched.id);
                    break;
                }
            }
            attempts++;
        }
        
        if (!firstPark && parks.length > 0) {
            firstPark = parks.shift();
        }
        
        parks = parks.map(park => {
            let photos = [];
            try { photos = JSON.parse(park.photos || '[]'); } catch(e) {}
            let maxScore = 0;
            for (let i = 0; i < Math.min(photos.length, 3); i++) {
                const imgUrl = photos[i];
                if (typeof imgUrl === 'string') {
                    const score = getImageQualityScore(imgUrl);
                    if (score > maxScore) maxScore = score;
                }
            }
            if (maxScore === 0) maxScore = 20;
            if (park.rating && parseFloat(park.rating) >= 4.5) maxScore += 15;
            else if (park.rating && parseFloat(park.rating) >= 4.0) maxScore += 8;
            return { ...park, imageScore: maxScore };
        });
        
        parks.sort((a, b) => b.imageScore - a.imageScore);
        if (firstPark) {
            delete firstPark.imageScore;
            parks.unshift(firstPark);
        }
        parks = parks.slice(0, count).map(park => { delete park.imageScore; return park; });
        
        currentParks = parks;
        renderLeftList(parks);
        renderRightList(parks);
        
        setTimeout(() => {
            initScrollSync();
            const rightScroll = document.getElementById('rightScroll');
            if (rightScroll) rightScroll.style.transform = 'translateY(0px)';
            
            // 检查收藏状态
            document.querySelectorAll('.collect-btn').forEach(async (btn) => {
                const parkId = btn.dataset.parkId;
                const isCollected = await checkParkCollected(parkId);

// 滚动同步
function initScrollSync() {
    const left = document.getElementById('leftScroll');
    const right = document.getElementById('rightScroll');
    if (!left || !right) return;
    
    if (left._scrollHandler) {
        left.removeEventListener('scroll', left._scrollHandler);
    }
    
    left._scrollHandler = () => {
        const leftMaxScroll = left.scrollHeight - left.clientHeight;
        const rightTotalHeight = right.scrollHeight - left.clientHeight;
        let moveY = 0;
        if (leftMaxScroll > 0 && rightTotalHeight > 0) {
            const rate = rightTotalHeight / leftMaxScroll;
            moveY = left.scrollTop * rate;
            moveY = Math.min(moveY, rightTotalHeight);
            moveY = Math.max(moveY, 0);
        }
        right.style.transform = `translateY(-${moveY}px)`;
    };
    
    left.addEventListener('scroll', left._scrollHandler);
    setTimeout(() => { left._scrollHandler(); }, 50);
}

async function loadRandomPosts(count = 3) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/posts?select=id,user_id,park_id,title,content,images,likes,comment_count,created_at&order=created_at.desc&limit=30`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (!response.ok) {
            console.error('获取帖子失败:', response.status);
            return [];
        }
        
        let posts = await response.json();
        console.log('📋 获取到的帖子:', posts);
        
        if (!posts || posts.length === 0) {
            return [];
        }
        
        posts = posts.filter(p => p.content && p.content.trim().length > 0);
        const shuffled = posts.sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, count);
        
        const userIds = [...new Set(selected.map(p => p.user_id).filter(id => id))];

        const result = selected.map(post => {

            const images = post.images || [];
            const coverImage = images.length > 0 ? images[0] : 'https://picsum.photos/seed/' + post.id + '/600/400';

            };
        });
        
        currentPosts = result;
        return result;
    } catch (error) {

        return [];

// ==================== 收藏功能 ====================
async function collectPark(parkId) {
    const session = getSession();
    if (!session) {
        showToast('请先登录再收藏公园', 'error');
        setTimeout(() => { window.location.href = '个人中心.html'; }, 1000);
        return false;
    }
    
    try {
        const checkResponse = await fetch(`${SUPABASE_URL}/rest/v1/favorites?user_id=eq.${session.user.id}&park_id=eq.${parkId}&select=id`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`
            }
        });
        
        if (!checkResponse.ok) {
            console.error('检查收藏失败:', checkResponse.status);
            showToast('操作失败，请重试', 'error');
            return false;
        }
        
        const existing = await checkResponse.json();
        
        if (existing && existing.length > 0) {
            const deleteResponse = await fetch(`${SUPABASE_URL}/rest/v1/favorites?id=eq.${existing[0].id}`, {
                method: 'DELETE',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${session.access_token}`,
                    'Prefer': 'return=minimal'
                }
            });
            if (deleteResponse.ok) {
                showToast('已取消收藏', 'success');
                return true;
            }
        } else {
            const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/favorites`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${session.access_token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    user_id: session.user.id,
                    park_id: parkId
                })
            });
            if (insertResponse.ok) {
                showToast('收藏成功！已添加到"收藏公园"', 'success');
                return true;
            }
        }
        showToast('操作失败，请重试', 'error');
        return false;
    } catch (error) {
        console.error('收藏错误:', error);
        showToast('网络错误，请重试', 'error');
        return false;
    }
}

async function checkParkCollected(parkId) {
    const session = getSession();
    if (!session) return false;
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/favorites?user_id=eq.${session.user.id}&park_id=eq.${parkId}&select=id`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`
            }
        });
        if (response.ok) {
            const data = await response.json();
            return data && data.length > 0;
        }
        return false;
    } catch (error) {
        console.error('检查收藏状态失败:', error);
        return false;
    }
}

function showToast(message, type = 'success') {
    const existing = document.querySelector('.toast-container');
    if (existing) existing.remove();
    
    const container = document.createElement('div');
    container.className = 'toast-container';
    
    const toast = document.createElement('div');
    toast.className = `toast-message ${type}`;
    const icon = type === 'success' ? '✅' : '❌';
    toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
    
    container.appendChild(toast);
    document.body.appendChild(container);
    
    requestAnimationFrame(() => { toast.classList.add('show'); });
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => { container.remove(); }, 300);
    }, 2500);
}

// ==================== 搜索 ====================
async function loadAllParksForSearch() {
    if (allParksCache.length > 0) return allParksCache;
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/parks?select=id,name,district&limit=500`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const parks = await response.json();
        const blacklist = ['消防', '防火', '禁毒', '法治', '法制', '主题公园', '雕塑', '纪念碑', '管理处', '消防文化', '安全文化', '国防教育'];
        allParksCache = parks.filter(park => {
            const name = park.name || '';
            if (!name.includes('公园')) return false;
            for (let word of blacklist) {
                if (name.includes(word)) return false;
            }
            return true;
        });
        return allParksCache;
    } catch (error) {
        console.error('加载公园列表失败:', error);
        return [];
    }
}

async function showSuggestions(keyword) {
    const dropdown = document.getElementById('suggestionsDropdown');
    if (!keyword.trim() || keyword.trim().length < 1) {
        dropdown.classList.add('hidden');
        return;
    }
    
    const allParks = await loadAllParksForSearch();
    const lowerKeyword = keyword.toLowerCase();
    let matches = allParks.filter(park => park.name.toLowerCase().includes(lowerKeyword));
    matches.sort((a, b) => {
        const aStarts = a.name.toLowerCase().startsWith(lowerKeyword);
        const bStarts = b.name.toLowerCase().startsWith(lowerKeyword);
        if (aStarts && !bStarts) return -1;
        if (!aStarts && bStarts) return 1;
        return a.name.length - b.name.length;
    });
    matches = matches.slice(0, 8);
    
    if (matches.length === 0) {
        dropdown.classList.add('hidden');
        return;
    }
    
    dropdown.innerHTML = matches.map(park => {
        const name = park.name;
        const district = park.district || '深圳';
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        const highlightedName = name.replace(regex, '<span class="search-highlight">$1</span>');
        return `
            <div class="search-suggestion-item" data-park-id="${park.id}" data-park-name="${escapeHtml(park.name)}">
                <div class="font-medium">${highlightedName}</div>
                <div class="text-xs text-gray-400 mt-0.5">${escapeHtml(district)}</div>
            </div>
        `;
    }).join('');
    
    dropdown.classList.remove('hidden');
    dropdown.querySelectorAll('.search-suggestion-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            const parkId = item.getAttribute('data-park-id');
            document.getElementById('searchInput').value = item.getAttribute('data-park-name');
            dropdown.classList.add('hidden');
            window.location.href = `公园详情.html?id=${parkId}`;
        });
    });
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshPark');
    const refreshPostBtn = document.getElementById('refreshPost');
    const searchBtn = document.getElementById('searchBtn');
    
    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => { showSuggestions(e.target.value); }, 300);
    });
    
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('suggestionsDropdown');
        const searchContainer = document.querySelector('.search-container');
        if (dropdown && !searchContainer.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
    
    if (searchBtn) {
        searchBtn.addEventListener('click', () => {
            document.getElementById('suggestionsDropdown').classList.add('hidden');
            const keyword = searchInput.value.trim();
            if (keyword) {
                alert(`搜索功能：为您找到关于"${keyword}"的公园，请从下拉建议中选择具体公园进入详情页`);
            }
        });
    }
    
    if (refreshBtn) {
        refreshBtn.addEventListener('click', () => { loadRandomParks(8); });
    }
    
    if (refreshPostBtn) {
        refreshPostBtn.addEventListener('click', async () => {
            const posts = await loadRandomPosts(3);
            renderPosts(posts);
        });
    }
    
    // 初始化加载
    loadRandomParks(8);
    loadAllParksForSearch();
    loadRandomPosts(3).then(posts => renderPosts(posts));
});
</script>
</body>
</html>
