            "light-green":"#609d7f"
          },
          borderRadius: {"full": "9999px"},

<body class="text-gray-800">

    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="我的足迹.html">我的足迹</a>
    
</div>
<div>
<button onclick="location.href='个人中心.html'" class="bg-y2k-pink text-white px-6 py-2 rounded-full shadow-lg shadow-y2k-pink/20 hover:scale-105 transition-transform">个人中心</button>

<main class="pt-40 px-6 max-w-4xl mx-auto pb-24">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="text-gray-500 hover:text-deep-green transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <h1 class="text-3xl font-bold text-deep-green">💬 私信</h1>
    </div>

    <!-- 未登录状态 -->
    <div id="notLoggedIn" class="text-center py-20">
        <div class="text-6xl mb-4">🔒</div>
        <h2 class="text-2xl font-bold text-deep-green mb-2">请先登录</h2>
        <p class="text-gray-500 mb-6">登录后查看你的私信</p>
        <button onclick="location.href='个人中心.html'" class="bg-light-green text-white px-8 py-3 rounded-full hover:opacity-90 transition">去登录</button>
    </div>

    <!-- 私信列表 -->
    <div id="chatList" class="hidden">
        <div id="chatListWrap" class="bg-white organic-sm shadow divide-y divide-gray-100 overflow-hidden">
            <!-- 内容由 JavaScript 渲染 -->
        </div>
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="hidden text-center py-20">
        <div class="text-6xl mb-4">📭</div>
        <h2 class="text-2xl font-bold text-deep-green mb-2">暂无私信</h2>
        <p class="text-gray-500">去社区和公园爱好者们聊聊天吧！</p>
    </div>
</main>

<footer class="w-full py-12 px-6 flex flex-col md:flex-row justify-between items-center gap-8 bg-white/10 backdrop-blur-md rounded-t-[4rem]">
    <div class="flex flex-col items-center md:items-start gap-4">
        <div class="text-[24px] font-bold text-y2k-pink">oasis</div>
        <p class="text-sm text-gray-500">© 2026 深圳绿洲(Shenzhen Oasis). 重拾城市宁静 | 地图数据 © 高德地图</p>
    </div>
    <div class="flex gap-8">
        <a class="text-gray-500 hover:text-y2k-cyan transition-colors text-sm" href="#">关于我们</a>
        <a class="text-gray-500 hover:text-y2k-cyan transition-colors text-sm" href="#">加入社区</a>
        <a class="text-gray-500 hover:text-y2k-cyan transition-colors text-sm" href="#">隐私政策</a>
        <a class="text-gray-500 hover:text-y2k-cyan transition-colors text-sm">服务条款</a>
    </div>
    <div class="flex gap-4">
        <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-gray-600 hover:text-y2k-cyan"><i class="fas fa-share-alt"></i></div>
        <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-gray-600 hover:text-y2k-cyan"><i class="fas fa-globe"></i></div>
    </div>
</footer>

<script>
const SUPABASE_URL = 'https://gjgacyoqpztsozoljsrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LcsFsepI69M19xAvYzMpcA_YCAmjvBl';

function getSession() {
    try {
        const sessionStr = localStorage.getItem('oasis_session');
        if (sessionStr) {
            const session = JSON.parse(sessionStr);
            const expiresAt = new Date(session.expires_at);
            if (expiresAt > new Date()) {
                return session;
            }
            localStorage.removeItem('oasis_session');
        }
    } catch(e) {}
    return null;
}

function getTimeAgo(dateStr) {
    if (!dateStr) return '刚刚';
    const date = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
    return date.toLocaleDateString('zh-CN');
}

async function getUserProfile(userId) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=id,full_name,avatar_url`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await response.json();
        return data && data.length > 0 ? data[0] : null;
    } catch (error) {
        console.error('获取用户资料失败:', error);
        return null;
    }
}

// ========== ✅ 修复：使用用户 token ==========
async function loadConversations(userId) {
    try {
        const session = getSession();
        if (!session) {
            console.error('❌ 没有登录 session');
            return [];
        }
        
        console.log('🔑 使用 token:', session.access_token.substring(0, 20) + '...');
        
        const response = await fetch(`${SUPABASE_URL}/rest/v1/conversations?or=(user1_id.eq.${userId},user2_id.eq.${userId})&order=last_message_time.desc`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`
            }
        });
        
        if (!response.ok) {
            console.error('加载对话失败:', response.status);
            const errorText = await response.text();
            console.error('错误详情:', errorText);
            return [];
        }
        
        const conversations = await response.json();
        console.log('📋 对话列表:', conversations);
        
        if (!conversations || conversations.length === 0) {
            return [];
        }
        
        // 获取每个对话的对方用户信息
        const enriched = await Promise.all(conversations.map(async (conv) => {
            const otherUserId = conv.user1_id === userId ? conv.user2_id : conv.user1_id;
            const profile = await getUserProfile(otherUserId);
            const unreadCount = conv.user1_id === userId ? conv.user1_unread_count : conv.user2_unread_count;
            return {
                ...conv,
                other_user_id: otherUserId,
                other_user: profile || { full_name: '用户', avatar_url: null },
                unread_count: unreadCount || 0
            };
        }));
        
        console.log('📋 增强后的对话列表:', enriched);
        return enriched;
    } catch (error) {
        console.error('加载对话错误:', error);
        return [];
    }
}

function renderConversations(conversations) {
    const wrap = document.getElementById('chatListWrap');
    if (!wrap) {
        console.error('❌ chatListWrap 元素未找到');
        return;
    }
    
    console.log('🎨 渲染对话, 数量:', conversations ? conversations.length : 0);
    
    if (!conversations || conversations.length === 0) {
        wrap.innerHTML = '';
        document.getElementById('chatList').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        return;
    }
    
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('chatList').classList.remove('hidden');
    wrap.innerHTML = '';
    
    conversations.forEach(conv => {
        const user = conv.other_user || { full_name: '用户', avatar_url: null };
        const avatar = user.avatar_url || 'https://picsum.photos/id/64/100/100';
        const name = user.full_name || '用户';
        const lastMsg = conv.last_message || '暂无消息';
        const timeAgo = getTimeAgo(conv.last_message_time);
        const unread = conv.unread_count || 0;
        
        const div = document.createElement('div');
        div.className = 'chat-item flex items-center gap-4 p-4 cursor-pointer hover:bg-gray-50 transition border-b border-gray-100';
        div.innerHTML = `
            <div class="relative">
                <img src="${avatar}" class="avatar-sm" onerror="this.src='https://picsum.photos/id/64/100/100'">
                ${unread > 0 ? `<span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">${unread}</span>` : ''}
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex justify-between items-center">
                    <span class="font-medium text-deep-green">${name}</span>
                    <span class="text-xs text-gray-400">${timeAgo}</span>
                </div>
                <p class="text-sm text-gray-500 truncate">${lastMsg}</p>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        `;
        div.onclick = () => {
            window.location.href = `私信详情.html?userId=${conv.other_user_id}`;
        };
        wrap.appendChild(div);
    });
    
    console.log('✅ 渲染完成, 共', wrap.children.length, '条对话');
}

async function init() {
    console.log('🚀 私信页面初始化...');
    const session = getSession();
    if (!session) {
        document.getElementById('notLoggedIn').classList.remove('hidden');
        document.getElementById('chatList').classList.add('hidden');
        document.getElementById('emptyState').classList.add('hidden');
        return;
    }
    
    document.getElementById('notLoggedIn').classList.add('hidden');
    document.getElementById('chatList').classList.remove('hidden');
    
    const userId = session.user.id;
    console.log('👤 当前用户ID:', userId);
    const conversations = await loadConversations(userId);
    renderConversations(conversations);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
