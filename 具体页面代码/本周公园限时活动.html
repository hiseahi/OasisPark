<script>
// ==================== Supabase 配置 ====================
const SUPABASE_URL = 'https://gjgacyoqpztsozoljsrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LcsFsepI69M19xAvYzMpcA_YCAmjvBl';

// ==================== 活动数据 ====================
const activityList = [
    {
        id: 0,
        tag: "莲花山｜周末",
        title: "春日风筝露营市集",
        parkName: "莲花山公园",
        time: "周六、周日 10:00 - 18:00",
        location: "莲花山公园 · 大草坪",
        desc: "全园开放露营区域，可自带野餐垫、风筝，现场设有文创市集与轻食摊位，适合家庭休闲、朋友聚会，免费参与无需预约。",
        park: "莲花山公园（福田区）"
    },
    {
        id: 1,
        tag: "深圳湾｜周三起",
        title: "滨海候鸟科普导览",
        parkName: "深圳湾公园",
        time: "周三至周日 09:00 / 15:00",
        location: "深圳湾公园 · 观鸟台",
        desc: "专业志愿者带队讲解候鸟知识，提供望远镜体验，沿滨海步道观鸟，全程免费，适合亲子科普、自然爱好者。",
        park: "深圳湾公园（南山区）"
    },
    {
        id: 2,
        tag: "西丽生态｜全周",
        title: "草坪野餐友好日",
        parkName: "西丽生态公园",
        time: "周一至周日 全天开放",
        location: "西丽生态公园 · 大草坪",
        desc: "全周允许自带熟食野餐，禁止明火，草坪宽敞平坦，宠物可牵绳进入，是城市里超舒适的放松空间。",
        park: "西丽生态公园（宝安区）"
    },
    {
        id: 3,
        tag: "大梅沙｜周末",
        title: "海边轻徒步活动",
        parkName: "大梅沙海滨公园",
        time: "周六、周日 16:00 - 18:00",
        location: "大梅沙海滨栈道",
        desc: "轻松沿海步道徒步，全程平缓无难度，傍晚可看绝美海边落日，适合散步、拍照、放松心情。",
        park: "大梅沙海滨公园（盐田区）"
    }
];

// ==================== 从数据库获取公园经纬度 ====================
async function getParkLocation(parkName) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/parks?name=eq.${encodeURIComponent(parkName)}&select=name,latitude,longitude,address`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (!response.ok) {
            console.error('获取公园数据失败:', response.status);
            return null;
        }
        
        const data = await response.json();
        console.log('📋 公园数据:', data);
        
        if (data && data.length > 0) {
            return {
                lng: parseFloat(data[0].longitude),
                lat: parseFloat(data[0].latitude),
                name: data[0].name,
                address: data[0].address || ''
            };
        }
        return null;
    } catch (error) {
        console.error('获取公园位置错误:', error);
        return null;
    }
}

// ==================== 显示活动 ====================
let mapIns = null;

async function showActivity(id) {
    const item = activityList[id];
    document.getElementById("tag").innerText = item.tag;
    document.getElementById("title").innerText = item.title;
    document.getElementById("parkName").innerText = item.parkName;
    document.getElementById("time").innerText = item.time;
    document.getElementById("location").innerText = item.location;
    document.getElementById("desc").innerText = item.desc;
    document.getElementById("mapPark").innerText = item.park;

    // ✅ 从数据库获取经纬度
    const pos = await getParkLocation(item.parkName);
    
    // ✅ 设置"查看公园"按钮跳转
    const viewParkBtn = document.querySelector('.px-6.py-2.border.border-light-green.rounded-full.text-light-green');
    if (viewParkBtn) {
        viewParkBtn.onclick = () => {
            window.location.href = `公园详情.html?name=${encodeURIComponent(item.parkName)}`;
        };
    }
    
    // ✅ 设置"报名参加"按钮（可选）
    const joinBtn = document.querySelector('.px-6.py-2.bg-light-green.text-white.rounded-full');
    if (joinBtn) {
        joinBtn.onclick = () => {
            alert(`✅ 您已成功报名「${item.title}」活动！\n地点：${item.parkName}\n时间：${item.time}`);
        };
    }
    
    if (pos) {
        // 销毁旧地图
        if (mapIns) mapIns.destroy();
        if (window.mapIns) window.mapIns.destroy();
        
        // 初始化地图
        mapIns = new AMap.Map('mapContainer', {
            zoom: 15,
            center: [pos.lng, pos.lat]
        });
        window.mapIns = mapIns;
        
        // 添加标记
        new AMap.Marker({
            position: [pos.lng, pos.lat],
            title: pos.name,
            map: mapIns
        });
        
        // 添加信息窗口
        const infoWindow = new AMap.InfoWindow({
            content: `<div style="padding:8px 12px;"><strong>${pos.name}</strong><br>${pos.address || ''}</div>`,
            offset: new AMap.Pixel(0, -30)
        });
        infoWindow.open(mapIns, [pos.lng, pos.lat]);
        
        document.getElementById('mapPark').innerText = `${pos.name} ${pos.address || ''}`;
    } else {
        // 如果数据库没有数据，显示提示
        document.getElementById('mapPark').innerText = '📍 暂无位置信息';
        const mapContainer = document.querySelector('#mapContainer .text-center p.text-sm');
        if (mapContainer) {
            mapContainer.innerText = '请先在数据库中添加公园坐标';
        }
    }
}
// ==================== 渲染选项卡 ====================
function renderTabs() {
    const container = document.getElementById('tabContainer');
    container.innerHTML = '';
    
    activityList.forEach((item, i) => {
        const tab = document.createElement('div');
        tab.className = `activity-tab px-6 py-3 rounded-full bg-white shadow-md text-base cursor-pointer ${i === 0 ? 'active border-b-2 border-light-green text-deep-green font-semibold' : ''}`;
        tab.dataset.id = i;
        tab.innerText = item.tag;
        tab.onclick = () => {
            document.querySelectorAll('.activity-tab').forEach(t => {
                t.classList.remove('active', 'border-b-2', 'border-light-green', 'text-deep-green', 'font-semibold');
            });
            tab.classList.add('active', 'border-b-2', 'border-light-green', 'text-deep-green', 'font-semibold');
            showActivity(i);
        };
        container.appendChild(tab);
    });
}

// ==================== URL 参数处理 ====================
function getUrlParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// ==================== 初始化 ====================
async function init() {
    renderTabs();
    
    // 检查 URL 参数，跳转到对应活动
    const parkName = getUrlParam('park');
    if (parkName) {
        // 查找匹配的活动
        let targetIndex = activityList.findIndex(item => item.parkName === parkName);
        if (targetIndex === -1) {
            // 尝试模糊匹配
            targetIndex = activityList.findIndex(item => parkName.includes(item.parkName) || item.parkName.includes(parkName));
        }
        if (targetIndex !== -1) {
            // 高亮对应的 tab
            const tabs = document.querySelectorAll('.activity-tab');
            tabs.forEach((tab, i) => {
                tab.classList.remove('active', 'border-b-2', 'border-light-green', 'text-deep-green', 'font-semibold');
                if (i === targetIndex) {
                    tab.classList.add('active', 'border-b-2', 'border-light-green', 'text-deep-green', 'font-semibold');
                }
            });
            await showActivity(targetIndex);
            return;
        }
    }
    
    // 默认显示第一个
    await showActivity(0);
}

// 滚动动画
const fadeItems = document.querySelectorAll('.fade-up');
function checkShow(){
    fadeItems.forEach(item=>{
        const top = item.getBoundingClientRect().top;
        if(top < window.innerHeight - 100) item.classList.add('active');
    })
}
window.addEventListener('scroll',checkShow);
window.addEventListener('load', () => {
    checkShow();
    init();
});
</script>
