<script>
const SUPABASE_URL = 'https://gjgacyoqpztsozoljsrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LcsFsepI69M19xAvYzMpcA_YCAmjvBl';

function getSession() {
    try {
        const sessionStr = localStorage.getItem('oasis_session');
        if (sessionStr) {
            const session = JSON.parse(sessionStr);
            const expiresAt = new Date(session.expires_at);
            if (expiresAt > new Date()) {
                return session;
            } else {
                localStorage.removeItem('oasis_session');
            }
        }
    } catch(e) {}
    return null;
}

function getUrlParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

let targetUserId = null;
let currentSession = null;
let currentUser = null;
let isFollowing = false;
let userProfile = null;
let currentOpenPostId = null;
let pendingDeleteCommentId = null;

async function loadUserProfile(userId) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=*`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!response.ok) throw new Error('加载用户信息失败');
        const data = await response.json();
        if (!data || data.length === 0) return null;
        return data[0];
    } catch (error) {
        console.error('加载用户信息错误:', error);
        return null;
    }
}

// ========== 方法3：联查 profiles 表获取作者信息 ==========
async function loadUserPosts(userId) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/posts?user_id=eq.${userId}&visibility=eq.public&order=created_at.desc&limit=50`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!response.ok) throw new Error('加载帖子失败');
        const posts = await response.json();
        
        // 为每个帖子补充作者信息（使用当前用户主页的主人信息）
        return posts.map(post => ({
            ...post,
            author_name: userProfile?.full_name || '用户',
            author_avatar: userProfile?.avatar_url || null
        }));
    } catch (error) {
        console.error('加载帖子错误:', error);
        return [];
    }
}

async function checkFollowStatus(followerId, followingId) {
    if (!followerId || !followingId) return false;
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/follows?follower_id=eq.${followerId}&following_id=eq.${followingId}&select=id`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!response.ok) return false;
        const data = await response.json();
        return data && data.length > 0;
    } catch (error) {
        console.error('检查关注状态错误:', error);
        return false;
    }
}

async function getFollowStats(userId) {
    try {
        const followRes = await fetch(`${SUPABASE_URL}/rest/v1/follows?follower_id=eq.${userId}&select=id`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const followData = await followRes.json();
        const fansRes = await fetch(`${SUPABASE_URL}/rest/v1/follows?following_id=eq.${userId}&select=id`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const fansData = await fansRes.json();
        return { followCount: followData ? followData.length : 0, fansCount: fansData ? fansData.length : 0 };
    } catch (error) {
        console.error('获取关注统计错误:', error);
        return { followCount: 0, fansCount: 0 };
    }
}

async function toggleFollow(targetId) {
    const session = getSession();
    if (!session) { 
        alert('请先登录'); 
        window.location.href = '个人中心.html'; 
        return; 
    }
    const followerId = session.user.id;
    
    // 不能关注自己
    if (followerId === targetId) {
        alert('不能关注自己');
        return;
    }
    
    try {
        if (isFollowing) {
            // 取消关注
            const response = await fetch(`${SUPABASE_URL}/rest/v1/follows?follower_id=eq.${followerId}&following_id=eq.${targetId}`, {
                method: 'DELETE',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${session.access_token}`,
                    'Prefer': 'return=minimal'
                }
            });
            if (response.ok) {
                isFollowing = false;
                updateFollowButton();
                const stats = await getFollowStats(targetId);
                document.getElementById('fansCount').textContent = stats.fansCount;
                showToast('已取消关注');
            } else {
                alert('取消关注失败，请重试');
            }
        } else {
            // 关注
            const response = await fetch(`${SUPABASE_URL}/rest/v1/follows`, {
                method: 'POST',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${session.access_token}`, 
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    follower_id: followerId, 
                    following_id: targetId
                })
            });
            
            if (response.ok) {
                isFollowing = true;
                updateFollowButton();
                const stats = await getFollowStats(targetId);
                document.getElementById('fansCount').textContent = stats.fansCount;
                showToast('关注成功！');
            } else {
                // ========== 处理重复关注错误 ==========
                const errorText = await response.text();
                console.error('关注失败:', errorText);
                
                // 如果是唯一约束冲突（已关注），刷新状态
                if (response.status === 409 || errorText.includes('duplicate key')) {
                    showToast('已关注该用户');
                    // 重新检查关注状态
                    const newStatus = await checkFollowStatus(followerId, targetId);
                    isFollowing = newStatus;
                    updateFollowButton();
                } else {
                    alert('关注失败，请重试');
                }
            }
        }
    } catch (error) {
        console.error('关注操作错误:', error);
        alert('网络错误，请重试');
    }
}

function updateFollowButton() {
    const btn = document.getElementById('followBtn');
    if (isFollowing) {
        btn.innerHTML = '<i class="fas fa-user-check"></i> 已关注';
        btn.className = 'px-6 py-2.5 rounded-full bg-gray-300 text-gray-700 hover:bg-gray-400 transition flex items-center gap-2';
    } else {
        btn.innerHTML = '<i class="fas fa-user-plus"></i> 关注';
        btn.className = 'px-6 py-2.5 rounded-full bg-light-green text-white hover:opacity-90 transition flex items-center gap-2';
    }
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'fixed top-24 left-1/2 -translate-x-1/2 bg-deep-green text-white px-6 py-3 rounded-full shadow-lg z-[9999] transition-opacity';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
}

function getTimeAgo(dateStr) {
    if (!dateStr) return '刚刚';
    const date = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
    return date.toLocaleDateString('zh-CN');
}

// ========== 渲染单条评论 ==========
function renderComment(cm, userMap, session, replyMap, depth = 0, isLoggedIn = false) {
    const user = userMap[cm.user_id] || {};
    const name = user.full_name || cm.user_id?.substring(0, 8) || '用户';
    const avatar = user.avatar_url || 'https://picsum.photos/id/64/100/100';
    const timeAgo = getTimeAgo(cm.created_at);
    const isOwnComment = session && cm.user_id === session.user.id;
    const replies = replyMap[cm.id] || [];
    const indentClass = depth > 0 ? 'ml-8 border-l-2 border-gray-200 pl-3' : '';
    const replyCount = replies.length;
    
    let html = `
        <div class="comment-item ${indentClass}" id="comment-${cm.id}">
            <div class="flex items-start gap-3 py-2">
                <div class="w-8 h-8 rounded-full overflow-hidden shrink-0 mt-0.5">
                    <img src="${avatar}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/id/64/100/100'">
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-xs font-medium text-gray-700">${name}</span>
                        <span class="text-xs text-gray-400">· ${timeAgo}</span>
                    </div>
                    <div class="text-sm text-gray-700 mt-0.5">${cm.content}</div>
                    <div class="flex items-center gap-3 mt-1">
                        ${isLoggedIn ? `<button class="reply-btn text-xs text-gray-400 hover:text-light-green" data-comment-id="${cm.id}">回复 ${replyCount > 0 ? `(${replyCount})` : ''}</button>` : ''}
                        ${isOwnComment ? `<button class="delete-comment-btn text-xs text-gray-400 hover:text-red-500" data-comment-id="${cm.id}">删除</button>` : ''}
                    </div>
                    <div id="reply-container-${cm.id}" class="hidden mt-2 flex items-center gap-2">
                        <input id="reply-input-${cm.id}" type="text" placeholder="回复 ${name}..." class="flex-1 border border-gray-200 rounded-full px-3 py-1.5 text-sm focus:outline-none focus:border-light-green">
                        <button class="reply-submit-btn bg-light-green text-white px-3 py-1.5 rounded-full text-xs hover:opacity-90" data-parent-id="${cm.id}">回复</button>
                        <button class="reply-cancel-btn text-xs text-gray-400 hover:text-gray-600" data-parent-id="${cm.id}">取消</button>
                    </div>
                    ${replies.length > 0 ? `<div class="mt-1">${replies.map(r => renderComment(r, userMap, session, replyMap, depth + 1, isLoggedIn)).join('')}</div>` : ''}
                </div>
            </div>
        </div>
    `;
    return html;
}

// ========== 加载评论 ==========
async function loadComments(postId) {
    const commentWrapEl = document.getElementById('commentWrap');
    if (!commentWrapEl) return;
    
    const session = getSession();
    const isLoggedIn = session !== null;
    
    commentWrapEl.innerHTML = `
        <div class="mb-3">
            <div class="flex items-center gap-2">
                <input id="commentInput" type="text" placeholder="${isLoggedIn ? '写下你的评论...' : '请先登录再评论'}" 
                       class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-light-green" 
                       ${!isLoggedIn ? 'disabled' : ''}>
                <button id="submitCommentBtn" class="bg-light-green text-white px-4 py-2 rounded-full text-sm hover:opacity-90 ${!isLoggedIn ? 'opacity-50 cursor-not-allowed' : ''}" 
                        ${!isLoggedIn ? 'disabled' : ''}>发送</button>
            </div>
        </div>
        <div class="text-center text-gray-400 text-sm py-4"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
    `;
    
    try {
        const url = `${SUPABASE_URL}/rest/v1/comments?post_id=eq.${postId}&order=created_at.desc&limit=50`;
        
        const response = await fetch(url, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (!response.ok) {
            console.error('加载评论失败, 状态码:', response.status);
            commentWrapEl.innerHTML = `<div class="text-center text-gray-400 text-sm py-4">加载评论失败</div>`;
            return;
        }
        
        const comments = await response.json();
        console.log('评论数据:', comments);
        
        // ========== 获取所有评论者的用户资料 ==========
        let userMap = {};
        if (comments && comments.length > 0) {
            // 收集所有评论者的 user_id
            const userIds = [...new Set(comments.map(c => c.user_id).filter(id => id))];
            
            if (userIds.length > 0) {
                try {
                    // 逐个获取用户资料（避免复杂查询语法问题）
                    const profilePromises = userIds.map(uid => 
                        fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${uid}&select=id,full_name,avatar_url`, {
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`
                            }
                        }).then(res => res.json())
                    );
                    
                    const allProfiles = await Promise.all(profilePromises);
                    allProfiles.forEach(profiles => {
                        if (profiles && profiles.length > 0) {
                            const p = profiles[0];
                            userMap[p.id] = p;
                        }
                    });
                    
                    console.log('获取到的用户资料映射:', userMap);
                } catch(e) {
                    console.error('获取用户资料异常:', e);
                }
            }
            
            // 对于没有获取到的用户，使用默认值（显示用户ID前8位）
            userIds.forEach(uid => {
                if (!userMap[uid]) {
                    userMap[uid] = {
                        full_name: uid.substring(0, 8),
                        avatar_url: 'https://picsum.photos/id/64/100/100'
                    };
                }
            });
        }
        
        // 构建树形结构
        const topComments = comments.filter(c => !c.parent_id);
        const replyMap = {};
        comments.forEach(c => {
            if (c.parent_id) {
                if (!replyMap[c.parent_id]) replyMap[c.parent_id] = [];
                replyMap[c.parent_id].push(c);
            }
        });
        
        topComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        Object.keys(replyMap).forEach(key => {
            replyMap[key].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        });
        
        let commentsHtml = '';
        if (topComments.length > 0) {
            topComments.forEach(cm => {
                commentsHtml += renderComment(cm, userMap, session, replyMap, 0, isLoggedIn);
            });
        } else {
            commentsHtml = `<div class="text-center text-gray-400 text-sm py-2">暂无评论，快来抢沙发！</div>`;
        }
        
        commentWrapEl.innerHTML = `
            <div class="mb-3">
                <div class="flex items-center gap-2">
                    <input id="commentInput" type="text" placeholder="${isLoggedIn ? '写下你的评论...' : '请先登录再评论'}" 
                           class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-light-green" 
                           ${!isLoggedIn ? 'disabled' : ''}>
                    <button id="submitCommentBtn" class="bg-light-green text-white px-4 py-2 rounded-full text-sm hover:opacity-90 ${!isLoggedIn ? 'opacity-50 cursor-not-allowed' : ''}" 
                            ${!isLoggedIn ? 'disabled' : ''}>发送</button>
                </div>
            </div>
            <div id="commentList">${commentsHtml}</div>
        `;
        
        // 绑定事件（保持不变）
        document.querySelectorAll('.reply-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const commentId = btn.dataset.commentId;
                toggleReplyInput(commentId);
            };
        });
        
        document.querySelectorAll('.reply-submit-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const parentId = btn.dataset.parentId;
                const input = document.getElementById(`reply-input-${parentId}`);
                if (input) {
                    await submitReply(postId, parentId, input.value.trim(), session);
                }
            };
        });
        
        document.querySelectorAll('.reply-cancel-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const parentId = btn.dataset.parentId;
                const container = document.getElementById(`reply-container-${parentId}`);
                if (container) container.classList.add('hidden');
            };
        });
        
        document.querySelectorAll('.delete-comment-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const commentId = btn.dataset.commentId;
                deleteComment(commentId);
            };
        });
        
        const submitBtn = document.getElementById('submitCommentBtn');
        const commentInput = document.getElementById('commentInput');
        if (submitBtn && commentInput && isLoggedIn) {
            submitBtn.onclick = async () => {
                const text = commentInput.value.trim();
                if (!text) {
                    alert('请输入评论内容');
                    return;
                }
                await submitReply(postId, null, text, session);
            };
        }
    } catch (error) {
        console.error('加载评论失败:', error);
        commentWrapEl.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">加载评论失败</div>';
    }
}
function toggleReplyInput(commentId) {
    const container = document.getElementById(`reply-container-${commentId}`);
    if (container) {
        container.classList.toggle('hidden');
        const input = document.getElementById(`reply-input-${commentId}`);
        if (input && !container.classList.contains('hidden')) {
            input.focus();
        }
    }
}

// ========== 提交回复 ==========
async function submitReply(postId, parentId, content, session) {
    if (!content) { alert('请输入内容'); return; }
    if (!session) { alert('请先登录'); return; }
    try {
        const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                post_id: postId,
                user_id: session.user.id,
                content: content,
                parent_id: parentId || null,
                created_at: new Date().toISOString()
            })
        });
        if (insertResponse.ok) {
            loadComments(postId);
            updateCommentCount(postId);
        } else {
            const error = await insertResponse.text();
            console.error('评论失败:', error);
            alert('评论失败，请重试');
        }
    } catch (error) {
        console.error('评论错误:', error);
        alert('网络错误，请重试');
    }
}

// ========== 更新评论数 ==========
async function updateCommentCount(postId) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/comments?post_id=eq.${postId}&select=id`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        const comments = await response.json();
        const count = comments ? comments.length : 0;
        
        const detailCommentEl = document.getElementById('detailComment');
        if (detailCommentEl) detailCommentEl.innerText = count;
        
    } catch (error) {
        console.error('更新评论数失败:', error);
    }
}

// ========== 删除评论 ==========
async function deleteComment(commentId) {
    const session = getSession();
    if (!session) {
        alert('请先登录');
        return;
    }
    
    pendingDeleteCommentId = commentId;
    const mask = document.getElementById('deleteConfirmMask');
    if (mask) mask.classList.remove('hidden');
}

// 确认删除
document.getElementById('confirmDeleteBtn')?.addEventListener('click', async function() {
    const commentId = pendingDeleteCommentId;
    if (!commentId) return;
    
    const session = getSession();
    if (!session) {
        alert('请先登录');
        return;
    }
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/comments?id=eq.${commentId}`, {
            method: 'DELETE',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`,
                'Prefer': 'return=minimal'
            }
        });
        
        if (response.ok) {
            const commentEl = document.getElementById(`comment-${commentId}`);
            if (commentEl) {
                commentEl.remove();
            }
            const commentList = document.getElementById('commentList');
            if (commentList && commentList.children.length === 0) {
                commentList.innerHTML = `<div class="text-center text-gray-400 text-sm py-2">暂无评论，快来抢沙发！</div>`;
            }
            document.getElementById('deleteConfirmMask')?.classList.add('hidden');
            pendingDeleteCommentId = null;
            
            // 更新评论数
            await updateCommentCount(currentOpenPostId);
        } else {
            const error = await response.text();
            console.error('删除失败:', error);
            alert('删除失败，请重试');
            document.getElementById('deleteConfirmMask')?.classList.add('hidden');
            pendingDeleteCommentId = null;
        }
    } catch (error) {
        console.error('删除错误:', error);
        alert('网络错误，请重试');
        document.getElementById('deleteConfirmMask')?.classList.add('hidden');
        pendingDeleteCommentId = null;
    }
});

// 取消删除
document.getElementById('cancelDeleteBtn')?.addEventListener('click', function() {
    document.getElementById('deleteConfirmMask')?.classList.add('hidden');
    pendingDeleteCommentId = null;
});

// 点击遮罩关闭
document.getElementById('deleteConfirmMask')?.addEventListener('click', function(e) {
    if (e.target === this) {
        this.classList.add('hidden');
        pendingDeleteCommentId = null;
    }
});

// ========== 打开帖子详情 ==========
async function openPostDetail(postItem) {
    const mask = document.getElementById('postDetailMask');
    const detailImgEl = document.getElementById('detailImg');
    const detailAvatarEl = document.getElementById('detailAvatar');
    const detailNameEl = document.getElementById('detailName');
    const detailTitleEl = document.getElementById('detailTitle');
    const detailDescEl = document.getElementById('detailDesc');
    const detailLikeEl = document.getElementById('detailLike');
    const detailCollectEl = document.getElementById('detailCollect');
    const detailCommentEl = document.getElementById('detailComment');
    const tagWrap = document.getElementById('detailTagWrap');
    const commentWrapDiv = document.getElementById('commentWrap');
    
    currentOpenPostId = postItem.id;
    
    const images = postItem.images || [];
    const coverImage = postItem.img || (images.length > 0 ? images[0] : 'https://picsum.photos/seed/default/400/400');
    if (detailImgEl) detailImgEl.src = coverImage;
    
    // 图片轮播
    const prevBtn = document.getElementById('prevImageBtn');
    const nextBtn = document.getElementById('nextImageBtn');
    const counter = document.getElementById('imageCounter');
    window._currentDetailImages = images;
    window._currentDetailIndex = 0;
    if (counter) {
        if (images.length > 1) {
            counter.classList.remove('hidden');
            counter.innerText = `1/${images.length}`;
        } else {
            counter.classList.add('hidden');
        }
    }
    if (prevBtn && nextBtn) {
        if (images.length > 1) {
            prevBtn.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
        } else {
            prevBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
        }
    }
    if (prevBtn) {
        prevBtn.onclick = function(e) {
            e.stopPropagation();
            if (!window._currentDetailImages || window._currentDetailImages.length === 0) return;
            window._currentDetailIndex = (window._currentDetailIndex - 1 + window._currentDetailImages.length) % window._currentDetailImages.length;
            detailImgEl.src = window._currentDetailImages[window._currentDetailIndex];
            if (counter) counter.innerText = `${window._currentDetailIndex + 1}/${window._currentDetailImages.length}`;
        };
    }
    if (nextBtn) {
        nextBtn.onclick = function(e) {
            e.stopPropagation();
            if (!window._currentDetailImages || window._currentDetailImages.length === 0) return;
            window._currentDetailIndex = (window._currentDetailIndex + 1) % window._currentDetailImages.length;
            detailImgEl.src = window._currentDetailImages[window._currentDetailIndex];
            if (counter) counter.innerText = `${window._currentDetailIndex + 1}/${window._currentDetailImages.length}`;
        };
    }
    
    // 使用联查返回的作者信息
    if (detailAvatarEl) {
        detailAvatarEl.src = postItem.author_avatar || 'https://picsum.photos/id/64/100/100';
    }
    if (detailNameEl) {
        detailNameEl.innerText = postItem.author_name || '用户';
    }
    if (detailTitleEl) {
        detailTitleEl.innerText = postItem.area || '公园打卡';
    }
    if (detailDescEl) {
        detailDescEl.innerText = postItem.content || '';
    }
    
    // 标签
    if (tagWrap) {
        tagWrap.innerHTML = '';
        ["#深圳公园", "#户外打卡", "#休闲放松"].forEach(tag => {
            let span = document.createElement('span');
            span.className = "px-2 py-1 bg-light-green/15 text-light-green rounded-full text-sm";
            span.innerText = tag;
            tagWrap.appendChild(span);
        });
    }
    
    // 点赞、收藏和评论数
    if (detailLikeEl) {
        const likeCount = await getLikeCount(postItem.id);
        detailLikeEl.innerText = likeCount;
    }
    if (detailCollectEl) {
        const collectCount = await getCollectCount(postItem.id);
        detailCollectEl.innerText = collectCount;
    }
    if (detailCommentEl) {
        const commentCount = await getCommentCount(postItem.id);
        detailCommentEl.innerText = commentCount;
    }
    
    // 加载评论
    if (commentWrapDiv) {
        commentWrapDiv.innerHTML = `<div class="text-center text-gray-400 text-sm py-4"><i class="fas fa-spinner fa-spin"></i> 加载评论中...</div>`;
        loadComments(postItem.id);
    }
    
    mask.classList.add('active');
}

document.getElementById('closePostDetail')?.addEventListener('click', function() {
    document.getElementById('postDetailMask').classList.remove('active');
});
document.getElementById('postDetailMask')?.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});

// ========== 渲染用户帖子 ==========
function renderUserPosts(posts) {
    const wrap = document.getElementById('userPostWrap');
    if (!wrap) return;
    if (!posts || posts.length === 0) {
        wrap.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400"><div class="text-4xl mb-3">📝</div><p>TA还没有发布过帖子</p></div>`;
        return;
    }
    wrap.innerHTML = '';
    posts.forEach(post => {
        // 从帖子自身获取作者信息
        const authorName = post.author_name || '用户';
        const authorAvatar = post.author_avatar || null;
        
        const images = post.images || [];
        const coverImage = images.length > 0 ? images[0] : 'https://picsum.photos/seed/' + post.id + '/400/300';
        const timeAgo = getTimeAgo(post.created_at);
        const titleText = post.title || post.park_name || post.park_id || '公园打卡';
        
        const div = document.createElement('div');
        div.className = "organic-sm bg-white shadow overflow-hidden cursor-pointer hover:shadow-lg transition";
        div.innerHTML = `
            <div class="h-[180px] bg-gray-100 relative">
                <img src="${coverImage}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/seed/${post.id}/400/300'">
                ${images.length > 1 ? `<span class="absolute bottom-2 right-2 bg-black/50 text-white text-xs px-2 py-0.5 rounded-full">📷 ${images.length}</span>` : ''}
            </div>
            <div class="p-4">
                <div class="flex justify-end"><span class="text-xs text-gray-400">${timeAgo}</span></div>
                <p class="text-sm text-gray-700 mt-1 line-clamp-2">${post.content || ''}</p>
                <div class="text-xs text-gray-400 mt-2">${titleText}</div>
            </div>
        `;
        div.onclick = () => {
            openPostDetail({
                id: post.id,
                img: coverImage,
                images: images,
                area: titleText,
                desc: post.content || '',
                content: post.content || '',
                author_name: authorName,
                author_avatar: authorAvatar,
                user_id: post.user_id
            });
        };
        wrap.appendChild(div);
    });
}

// ========== 初始化 ==========

    targetUserId = getUrlParam('userId');
    currentSession = getSession();
    if (currentSession) currentUser = currentSession.user;
    if (!targetUserId) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('notFoundState').classList.remove('hidden');
        return;
    }
    if (currentUser && targetUserId === currentUser.id) {
        window.location.href = '个人中心.html';
        return;
    }
    const profile = await loadUserProfile(targetUserId);
    if (!profile) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('notFoundState').classList.remove('hidden');
        return;
    }
    userProfile = profile;
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('userContent').classList.remove('hidden');
    
    document.getElementById('userName').textContent = profile.full_name || '用户';
    document.getElementById('userBio').textContent = profile.bio || '这个人很懒，还没写简介~';

    }
    
    const stats = await getFollowStats(targetUserId);
    document.getElementById('followCount').textContent = stats.followCount;
    document.getElementById('fansCount').textContent = stats.fansCount;
    
    // ========== 检查关注状态 ==========
    if (currentUser) {
        isFollowing = await checkFollowStatus(currentUser.id, targetUserId);
        updateFollowButton();
        document.getElementById('followBtn').onclick = () => toggleFollow(targetUserId);
    } else {
        document.getElementById('followBtn').onclick = () => { alert('请先登录'); window.location.href = '个人中心.html'; };
    }
    document.getElementById('chatBtn').onclick = () => {
    if (!currentUser) { 
        alert('请先登录'); 
        window.location.href = '个人中心.html'; 
        return; 
    }
    if (targetUserId === currentUser.id) { 
        alert('不能给自己发私信'); 
        return; 
    }
    window.location.href = `私信详情.html?userId=${targetUserId}`;
};
    
    const posts = await loadUserPosts(targetUserId);
    document.getElementById('postCount').textContent = posts.length || 0;
    renderUserPosts(posts);
}
document.addEventListener('DOMContentLoaded', init);
