<!DOCTYPE html>
<html class="light" lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>私信详情 | Oasis城市绿洲</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.geekzu.org/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: linear-gradient(to bottom, #1B3C35 0%, #1B3C35 8%, #f8fbf8 8%, #ffffff 100%);
      background-attachment: fixed;
    }
    .organic-sm { border-radius: 1.5rem; }
    .message-bubble {
      max-width: 70%;
      padding: 10px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .message-sent {
      background: #609d7f;
      color: white;
      border-bottom-right-radius: 4px;
      margin-left: auto;
    }
    .message-received {
      background: white;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .message-time {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .message-sent .message-time {
      color: rgba(255,255,255,0.7);
    }
    .chat-container {
      height: calc(100vh - 280px);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-input-wrap {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
    }
    .chat-input-wrap input {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 9999px;
      padding: 10px 20px;
      outline: none;
      font-size: 14px;
    }
    .chat-input-wrap input:focus {
      border-color: #609d7f;
    }
    .chat-input-wrap button {
      background: #609d7f;
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 10px 28px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .chat-input-wrap button:hover {
      opacity: 0.85;
    }
    .chat-input-wrap button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .avatar-xs {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .message-group {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .message-group-received {
      align-self: flex-start;
    }
    .message-group-sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
</style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "y2k-pink": "#ff85c0",
            "y2k-cyan": "#00f5ff",
            "deep-green":"#1B3C35",
            "light-green":"#609d7f"
          },
          borderRadius: {"full": "9999px"},
        },
      },
    }
</script>
</head>
<body class="text-gray-800">

<!-- 顶部导航栏 -->
<nav class="flex justify-between items-center px-6 w-full fixed top-0 left-0 right-0 z-50 bg-deep-green py-4">
<div class="text-[48px] font-black text-y2k-pink">oasis</div>
<div class="hidden md:flex items-center rounded-full mx-auto px-8 gap-20 py-1 bg-white/80 backdrop-blur-lg shadow-lg min-w-[700px] justify-center">
    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="index.html">首页</a>
    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="探索.html">探索</a>
    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="寻找公园.html">寻找公园</a>
    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="社区.html">社区</a>
    <a class="text-y2k-pink font-semibold px-4 py-2 rounded-[20px] hover:bg-y2k-pink hover:text-white transition-all" href="我的足迹.html">我的足迹</a>
</div>
<div>
<button onclick="location.href='个人中心.html'" class="bg-y2k-pink text-white px-6 py-2 rounded-full shadow-lg shadow-y2k-pink/20 hover:scale-105 transition-transform">个人中心</button>
</div>
</nav>

<main class="pt-40 px-6 max-w-4xl mx-auto pb-6">
    <!-- 未登录状态 -->
    <div id="notLoggedIn" class="text-center py-20">
        <div class="text-6xl mb-4">🔒</div>
        <h2 class="text-2xl font-bold text-deep-green mb-2">请先登录</h2>
        <p class="text-gray-500 mb-6">登录后查看私信</p>
        <button onclick="location.href='个人中心.html'" class="bg-light-green text-white px-8 py-3 rounded-full hover:opacity-90 transition">去登录</button>
    </div>

    <!-- 聊天界面 -->
    <div id="chatView" class="hidden">
        <!-- 聊天头部 -->
        <div class="flex items-center gap-4 mb-4 bg-white p-4 organic-sm shadow">
            <button onclick="location.href='私信.html'" class="text-gray-500 hover:text-deep-green transition">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <div class="w-12 h-12 rounded-full overflow-hidden">
                <img id="chatAvatar" src="https://picsum.photos/id/64/100/100" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="chatName" class="text-xl font-bold text-deep-green">加载中...</h2>
                <p id="chatStatus" class="text-xs text-gray-400">在线</p>
            </div>
        </div>

        <!-- 消息列表 -->
        <div id="messageContainer" class="chat-container bg-white organic-sm shadow">
            <div class="text-center text-gray-400 text-sm py-4">
                <i class="fas fa-spinner fa-spin"></i> 加载消息中...
            </div>
        </div>

        <!-- 输入框 -->
        <div class="chat-input-wrap mt-4">
            <input id="messageInput" type="text" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</main>

<script>
const SUPABASE_URL = 'https://gjgacyoqpztsozoljsrd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LcsFsepI69M19xAvYzMpcA_YCAmjvBl';

let currentSession = null;
let currentUser = null;
let currentUserProfile = null;  // ✅ 当前用户的完整资料（包含头像）
let targetUser = null;
let targetUserId = null;
let messagePolling = null;

function getSession() {
    try {
        const sessionStr = localStorage.getItem('oasis_session');
        if (sessionStr) {
            const session = JSON.parse(sessionStr);
            const expiresAt = new Date(session.expires_at);
            if (expiresAt > new Date()) {
                return session;
            }
            localStorage.removeItem('oasis_session');
        }
    } catch(e) {}
    return null;
}

function getUrlParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

function getTimeAgo(dateStr) {
    if (!dateStr) return '刚刚';
    const date = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
    return date.toLocaleDateString('zh-CN');
}

function formatTime(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

async function getUserProfile(userId) {
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=id,full_name,avatar_url`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await response.json();
        return data && data.length > 0 ? data[0] : null;
    } catch (error) {
        console.error('获取用户资料失败:', error);
        return null;
    }
}

async function getOrCreateConversation(user1Id, user2Id) {
    try {
        // 检查是否已有对话
        const response = await fetch(`${SUPABASE_URL}/rest/v1/conversations?or=(and(user1_id.eq.${user1Id},user2_id.eq.${user2Id}),and(user1_id.eq.${user2Id},user2_id.eq.${user1Id}))&select=id`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${getSession()?.access_token}`
            }
        });
        
        const data = await response.json();
        if (data && data.length > 0) {
            return data[0].id;
        }
        
        // 创建新对话
        const createResponse = await fetch(`${SUPABASE_URL}/rest/v1/conversations`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${getSession()?.access_token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify({
                user1_id: user1Id,
                user2_id: user2Id,
                last_message: '',
                last_message_time: new Date().toISOString()
            })
        });
        
        const newData = await createResponse.json();
        return newData[0]?.id;
    } catch (error) {
        console.error('创建对话失败:', error);
        return null;
    }
}

// ========== loadMessages 使用正确的查询条件 ==========
async function loadMessages(userId, otherUserId) {
    try {
        // 查询所有涉及当前用户的消息（发送或接收）
        const url = `${SUPABASE_URL}/rest/v1/messages?or=(sender_id.eq.${userId},receiver_id.eq.${userId})&order=created_at.asc&limit=100`;
        console.log('📥 请求消息URL:', url);
        
        const response = await fetch(url, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${getSession()?.access_token}`
            }
        });
        
        if (!response.ok) {
            console.error('加载消息失败:', response.status);
            return [];
        }
        
        const messages = await response.json();
        console.log('📥 消息列表:', messages);
        return messages;
    } catch (error) {
        console.error('加载消息错误:', error);
        return [];
    }
}

// ========== ✅ 修复：renderMessages 使用正确的头像 ==========
function renderMessages(messages, userId) {
    const container = document.getElementById('messageContainer');
    if (!container) return;
    
    if (!messages || messages.length === 0) {
        container.innerHTML = `
            <div class="text-center text-gray-400 text-sm py-10">
                <div class="text-4xl mb-3">💬</div>
                <p>还没有消息，打个招呼吧！</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    messages.forEach(msg => {
        const isSent = msg.sender_id === userId;
        // ✅ 使用当前用户资料或对方用户资料获取头像
        let avatarUrl;
        if (isSent) {
            avatarUrl = currentUserProfile?.avatar_url || 'https://picsum.photos/id/64/32/32';
        } else {
            avatarUrl = targetUser?.avatar_url || 'https://picsum.photos/id/64/32/32';
        }
        const time = formatTime(msg.created_at);
        
        html += `
            <div class="message-group ${isSent ? 'message-group-sent' : 'message-group-received'}">
                <img src="${avatarUrl}" class="avatar-xs" onerror="this.src='https://picsum.photos/id/64/32/32'">
                <div>
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        ${msg.content}
                    </div>
                    <div class="message-time text-right">${time}</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

async function markMessagesAsRead(userId, otherUserId) {
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/messages?receiver_id=eq.${userId}&sender_id=eq.${otherUserId}&is_read=eq.false`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${getSession()?.access_token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ is_read: true })
        });
    } catch (error) {
        console.error('标记已读失败:', error);
    }
}

// ========== sendMessage 使用正确的 session ==========
async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !currentUser || !targetUserId) return;
    
    const senderId = currentUser.id;
    const receiverId = targetUserId;
    
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;
    
    try {
        const session = getSession();
        console.log('📤 发送消息 - session:', session);
        console.log('📤 sender_id:', senderId);
        console.log('📤 receiver_id:', receiverId);
        
        if (!session) {
            alert('请重新登录');
            window.location.href = '个人中心.html';
            return;
        }
        
        const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${session.access_token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify({
                sender_id: senderId,
                receiver_id: receiverId,
                content: content,
                is_read: false,
                created_at: new Date().toISOString()
            })
        });
        
        const responseText = await response.text();
        console.log('📥 响应状态:', response.status);
        console.log('📥 响应内容:', responseText);
        
        if (!response.ok) {
            alert(`发送失败: ${responseText}`);
            return;
        }
        
        // 成功发送
        input.value = '';
        
        // 更新对话
        const convId = await getOrCreateConversation(senderId, receiverId);
        if (convId) {
            try {
                const convRes = await fetch(`${SUPABASE_URL}/rest/v1/conversations?id=eq.${convId}&select=user1_id,user2_id,user1_unread_count,user2_unread_count`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${session.access_token}`
                    }
                });
                const convData = await convRes.json();
                if (convData && convData.length > 0) {
                    const conv = convData[0];
                    const isUser1 = conv.user1_id === senderId;
                    const unreadField = isUser1 ? 'user2_unread_count' : 'user1_unread_count';
                    const currentUnread = isUser1 ? (conv.user2_unread_count || 0) : (conv.user1_unread_count || 0);
                    
                    await fetch(`${SUPABASE_URL}/rest/v1/conversations?id=eq.${convId}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${session.access_token}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                            last_message: content,
                            last_message_time: new Date().toISOString(),
                            [unreadField]: currentUnread + 1
                        })
                    });
                }
            } catch (e) {
                console.error('更新对话失败:', e);
            }
        }
        
        // ✅ 重新加载消息（显示刚发的消息）
        await refreshMessages();
        
    } catch (error) {
        console.error('发送错误:', error);
        alert('网络错误，请重试');
    } finally {
        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
    }
}

async function refreshMessages() {
    if (!currentUser) return;
    const messages = await loadMessages(currentUser.id, targetUserId);
    renderMessages(messages, currentUser.id);
}

// ========== ✅ 修复：init 函数获取当前用户资料 ==========
async function init() {
    currentSession = getSession();
    if (!currentSession) {
        document.getElementById('notLoggedIn').classList.remove('hidden');
        document.getElementById('chatView').classList.add('hidden');
        return;
    }
    
    currentUser = currentSession.user;
    targetUserId = getUrlParam('userId');
    
    if (!targetUserId) {
        alert('参数错误');
        window.location.href = '私信.html';
        return;
    }
    
    if (targetUserId === currentUser.id) {
        alert('不能给自己发私信');
        window.location.href = '私信.html';
        return;
    }
    
    // ✅ 获取当前用户的完整资料（包含头像）
    currentUserProfile = await getUserProfile(currentUser.id);
    console.log('✅ 当前用户资料:', currentUserProfile);
    
    document.getElementById('notLoggedIn').classList.add('hidden');
    document.getElementById('chatView').classList.remove('hidden');
    
    // 获取对方用户信息
    targetUser = await getUserProfile(targetUserId);
    if (targetUser) {
        document.getElementById('chatName').textContent = targetUser.full_name || '用户';
        document.getElementById('chatAvatar').src = targetUser.avatar_url || 'https://picsum.photos/id/64/100/100';
    }
    
    // 标记已读
    await markMessagesAsRead(currentUser.id, targetUserId);
    
    // 加载消息
    await refreshMessages();
    
    // 启动轮询（每3秒刷新一次）
    if (messagePolling) clearInterval(messagePolling);
    messagePolling = setInterval(refreshMessages, 3000);
}

window.addEventListener('beforeunload', function() {
    if (messagePolling) {
        clearInterval(messagePolling);
    }
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
